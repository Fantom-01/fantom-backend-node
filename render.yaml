services:
    - type: web
      name: fantom-backend-node
      runtime: node
      buildCommand: npm install && npx prisma generate
      startCommand: npm start
      envVars:
          - key: DATABASE_URL
            sync: false
          - key: JWT_SECRET
            sync: false
          - key: ADMIN_EMAIL
            sync: false
          - key: ADMIN_PASSWORD
            sync: false
          - key: RESEND_API_KEY
            sync: false
          - key: FRONTEND_URL
            sync: false
